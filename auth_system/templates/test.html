<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Successfully</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@400;500;600&display=swap');

body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, hsl(327, 59%, 42%), #78ffd6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: linear-gradient(145deg, #ffffff, #f0f4f8);
    padding: 50px 40px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    width: 380px;
    max-width: 90%;
    text-align: center;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(46,204,113,0.2) 0%, transparent 70%);
    top: -50%;
    left: -50%;
    transform: rotate(45deg);
    transition: all 0.5s ease;
}

.card:hover::before {
    transform: rotate(90deg);
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 25px 45px rgba(0,0,0,0.15);
}

h1 {
    color: #2c3e50;
    font-size: 2.5em;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
}

h1 span {
    display: inline-block;
    animation: bounce 1s infinite alternate;
    color: #27ae60;
}

@keyframes bounce {
    0% { transform: translateY(0);}
    100% { transform: translateY(-10px);}
}

p {
    font-family: 'Poppins', sans-serif;
    font-size: 1.15em;
    line-height: 1.6;
    margin-bottom: 30px;
    font-weight: 500;
    position: relative;
    z-index: 1;
    background: linear-gradient(90deg, #27ae60, #2ecc71);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.button {
    display: inline-block;
    padding: 14px 30px;
    background: #2ecc71;
    color: white;
    font-weight: 700;
    text-decoration: none;
    border-radius: 12px;
    transition: background 0.3s, transform 0.3s;
    position: relative;
    z-index: 1;
}

.button:hover {
    background: #27ae60;
    transform: translateY(-3px);
}
</style>
</head>

<body>

<div class="card">
    <h1>✅ <span>SUCCESS</span></h1>
    <p>Your test has been completed successfully.</p>
    <a href="#" class="button">Continue</a>
</div>

</body>
</html>
